<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <title>Truong Bao Huy</title>

  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(to right, #e0c3fc, #8ec5fc, #a0e9fd);
      color: #222;
      margin: 0;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 40px;
      background: white;
      position: sticky;
      top: 0;
      z-index: 1000;
      box-shadow: 0 2px 5px rgba(0, 0, 0, 0.05);
    }

    .logo {
      font-weight: bold;
      font-size: 22px;
    }

    .logo span {
      background: black;
      color: white;
      padding: 3px 6px;
      border-radius: 4px;
    }

    nav ul {
      display: flex;
      gap: 20px;
      list-style: none;
      margin: 0;
      padding: 0;
    }

    nav a {
      text-decoration: none;
      color: black;
      font-weight: 500;
      padding: 8px 14px;
      border-radius: 8px;
      transition: all 0.3s ease;
    }

    nav a.active,
    nav a:hover {
      background: #09f482;
      color: white;
      box-shadow: 0 2px 8px rgba(0, 119, 255, 0.2);
    }

    .social-icons {
      display: flex;
      gap: 15px;
      align-items: center;
    }

    .social-icons a {
      font-size: 20px;
      color: #333;
      transition: color 0.3s;
    }

    .social-icons a:hover {
      color: #0077ff;
    }

    .hamburger {
      display: none;
      font-size: 26px;
      cursor: pointer;
    }

    .mobile-nav {
      display: none;
      flex-direction: column;
      gap: 10px;
      margin-top: 10px;
    }

    @media (max-width: 768px) {
      nav ul {
        display: none;
        flex-direction: column;
        background: white;
        position: absolute;
        top: 70px;
        right: 20px;
        padding: 10px 20px;
        border-radius: 10px;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
      }

      nav ul.active {
        display: flex;
      }

      .hamburger {
        display: block;
      }

      .social-icons {
        display: none;
      }
    }

    .section {
      padding: 60px 40px;
    }

    .contact-section {
      background: linear-gradient(to right, #e0c3fc, #8ec5fc, #a0e9fd);
      padding: 80px 20px;
    }

    .contact-container {
      display: flex;
      justify-content: center;
      align-items: stretch;
      flex-wrap: wrap;
      gap: 4rem;
      max-width: 1000px;
      margin: 0 auto;
    }

    .contact-left {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: flex-start;
      padding-left: 1rem;
    }

    .contact-left h1 {
      font-size: 50px;
      font-weight: bold;
      color: #444;
      margin: 0;
    }

    .contact-right {
      flex: 1;
      background-color: #fdecec;
      padding: 2rem;
      border-radius: 1rem;
      width: 100%;
      max-width: 500px;
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
    }

    .contact-right .greeting {
      font-style: italic;
      margin-bottom: 1rem;
      color: #333;
      font-size: 16px;
    }

    .form-group {
      margin-bottom: 1.5rem;
    }

    .form-group label {
      display: block;
      font-weight: 600;
      margin-bottom: 0.5rem;
      color: #222;
    }

    input,
    textarea {
      width: 100%;
      padding: 0.75rem 1rem;
      border: 1px solid #aaa;
      border-radius: 8px;
      background-color: #fff;
      font-size: 1rem;
      transition: all 0.2s ease;
    }

    input:focus,
    textarea:focus {
      border-color: #7b4dff;
      box-shadow: 0 0 0 2px rgba(123, 77, 255, 0.2);
      outline: none;
    }

    textarea {
      resize: vertical;
    }

    .required {
      color: red;
      margin-left: 4px;
    }

    .submit-button {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
      width: 100%;
      padding: 0.9rem;
      background-color: #d8b4fe;
      border: none;
      border-radius: 8px;
      color: #222;
      font-weight: bold;
      font-size: 1.1rem;
      cursor: pointer;
      transition: background-color 0.3s;
    }

    .submit-button:hover {
      background-color: #c084fc;
      color: white;
    }

    .regards-text {
      text-align: left;
      font-weight: 500;
      margin-bottom: 0.8rem;
      font-size: 16px;
      color: #111;
    }

    .say-hello-animate {
      font-size: 50px;
      font-weight: bold;
      white-space: nowrap;
      overflow: hidden;
      border-right: 3px solid #09f482;
      width: fit-content;
      animation: typing 3s steps(12) infinite alternate, blink 0.7s step-end infinite;
      background: linear-gradient(90deg, #ff6ec4, #7873f5, #09f482, #fcb045);
      background-size: 300%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation-delay: 0s;
    }

    @keyframes typing {
      from {
        width: 0;
      }

      to {
        width: 12ch;
      }
    }

    @keyframes blink {
      50% {
        border-color: transparent;
      }
    }
  </style>
</head>

<body>
  <header>
    <div class="logo">Truong Bao Huy <span>dev</span></div>
    <div class="hamburger" onclick="toggleMenu()"><i class="fas fa-bars"></i></div>
    <nav>
      <ul id="navMenu">
        <li><a href="index.html">Home</a></li>
        <li><a href="about.html">About Me</a></li>
        <li><a href="interset.html">Interest</a></li>
        <li><a href="contact.html" class="active">Contact Us</a></li>
      </ul>
    </nav>
    <div class="social-icons">
      <a href="https://www.facebook.com/share/1A5z9y3F2s/?mibextid=wwXIfr" target="_blank"><i
          class="fab fa-facebook"></i></a>
      <a href="https://www.instagram.com/tb.yuh265?igsh=MXN4MjU1NzRjZHhubQ%3D%3D&utm_source=qr" target="_blank"><i class="fab fa-instagram"></i></a>
    </div>
  </header>

  <!-- Contact Section -->
  <section class="contact-section section">
    <div class="contact-container">
      <div class="contact-left">
       <h1 class="say-hello-animate">Say Hi!</h1>

      </div>
      <div class="contact-right">
        <p class="greeting">Dear Truong Bao Huy,</p>
        <form id="contactForm">
          <div class="form-group">
            <label for="from_name">Your Name<span class="required">*</span></label>
            <input type="text" id="from_name" name="from_name" placeholder="Enter your full name" required />
          </div>
          <div class="form-group">
            <label for="from_email">Your Email<span class="required">*</span></label>
            <input type="email" id="from_email" name="from_email" placeholder="Enter your email address" required />
          </div>
          <div class="form-group">
            <label for="message">Message<span class="required">*</span></label>
            <textarea id="message" name="message" rows="6" placeholder="Write your message here..." required></textarea>
          </div>
          <p class="regards-text">Regards and Thank You!</p>
          <div class="form-group">
            <button type="submit" class="submit-button">
              <i class="fas fa-paper-plane"></i> Send
            </button>
          </div>
        </form>
      </div>
    </div>
  </section>

  <!-- Load EmailJS SDK -->
  <script src="https://cdn.emailjs.com/dist/email.min.js"></script>
  <script>
    emailjs.init("RBSbWnsQGlVnj3AR5");

    document.getElementById("contactForm").addEventListener("submit", function (e) {
      e.preventDefault();

      emailjs.sendForm("service_49z8py6", "template_6mb2dqn", this)
        .then(function () {
          alert("Email sent successfully!");
          document.getElementById("contactForm").reset();
        }, function (error) {
          alert("Failed to send email: " + error.text);
          console.error("EmailJS error:", error);
        });
    });

    function toggleMenu() {
      document.getElementById("navMenu").classList.toggle("active");
    }
  </script>
</body>

</html>
